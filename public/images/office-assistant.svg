<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750">
  <defs>
    <radialGradient id="bg" cx="30%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#2e3a1f"/>
      <stop offset="60%" stop-color="#1d2512"/>
      <stop offset="100%" stop-color="#111a0a"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8fa36c" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8fa36c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c4c97a" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#c4c97a" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-sm">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <filter id="blur-md">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="750" fill="url(#bg)"/>

  <!-- Ambient glow center -->
  <ellipse cx="420" cy="340" rx="380" ry="280" fill="url(#glow1)"/>
  <ellipse cx="820" cy="200" rx="240" ry="200" fill="url(#glow2)"/>

  <!-- Grid lines — горизонтальные -->
  <g stroke="#8fa36c" stroke-width="0.4" opacity="0.12">
    <line x1="0" y1="125" x2="1200" y2="125"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="375" x2="1200" y2="375"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="0" y1="625" x2="1200" y2="625"/>
  </g>

  <!-- Grid lines — вертикальные -->
  <g stroke="#8fa36c" stroke-width="0.4" opacity="0.12">
    <line x1="150" y1="0" x2="150" y2="750"/>
    <line x1="300" y1="0" x2="300" y2="750"/>
    <line x1="450" y1="0" x2="450" y2="750"/>
    <line x1="600" y1="0" x2="600" y2="750"/>
    <line x1="750" y1="0" x2="750" y2="750"/>
    <line x1="900" y1="0" x2="900" y2="750"/>
    <line x1="1050" y1="0" x2="1050" y2="750"/>
  </g>

  <!-- Neural network nodes and connections -->
  <!-- Central cluster -->
  <g opacity="0.7">
    <!-- Connections -->
    <line x1="400" y1="320" x2="540" y2="240" stroke="#8fa36c" stroke-width="0.8" opacity="0.4"/>
    <line x1="400" y1="320" x2="280" y2="420" stroke="#8fa36c" stroke-width="0.8" opacity="0.4"/>
    <line x1="400" y1="320" x2="520" y2="420" stroke="#8fa36c" stroke-width="0.8" opacity="0.4"/>
    <line x1="400" y1="320" x2="320" y2="200" stroke="#8fa36c" stroke-width="0.6" opacity="0.3"/>
    <line x1="540" y1="240" x2="680" y2="280" stroke="#8fa36c" stroke-width="0.8" opacity="0.4"/>
    <line x1="540" y1="240" x2="620" y2="140" stroke="#8fa36c" stroke-width="0.6" opacity="0.3"/>
    <line x1="280" y1="420" x2="180" y2="500" stroke="#8fa36c" stroke-width="0.6" opacity="0.3"/>
    <line x1="520" y1="420" x2="660" y2="480" stroke="#8fa36c" stroke-width="0.6" opacity="0.3"/>
    <line x1="680" y1="280" x2="820" y2="240" stroke="#8fa36c" stroke-width="0.6" opacity="0.3"/>
    <line x1="820" y1="240" x2="960" y2="300" stroke="#8fa36c" stroke-width="0.5" opacity="0.25"/>
    <line x1="660" y1="480" x2="780" y2="520" stroke="#8fa36c" stroke-width="0.5" opacity="0.25"/>

    <!-- Nodes — dim -->
    <circle cx="320" cy="200" r="2.5" fill="#8fa36c" opacity="0.4"/>
    <circle cx="180" cy="500" r="2.5" fill="#8fa36c" opacity="0.4"/>
    <circle cx="620" cy="140" r="2.5" fill="#8fa36c" opacity="0.4"/>
    <circle cx="960" cy="300" r="2.5" fill="#8fa36c" opacity="0.35"/>
    <circle cx="780" cy="520" r="2.5" fill="#8fa36c" opacity="0.35"/>

    <!-- Nodes — medium -->
    <circle cx="280" cy="420" r="3.5" fill="#8fa36c" opacity="0.55"/>
    <circle cx="520" cy="420" r="3.5" fill="#8fa36c" opacity="0.55"/>
    <circle cx="680" cy="280" r="3.5" fill="#8fa36c" opacity="0.55"/>
    <circle cx="660" cy="480" r="3" fill="#8fa36c" opacity="0.5"/>
    <circle cx="820" cy="240" r="3" fill="#8fa36c" opacity="0.45"/>

    <!-- Nodes — bright -->
    <circle cx="540" cy="240" r="5" fill="#8fa36c" opacity="0.7" filter="url(#blur-sm)"/>
    <circle cx="540" cy="240" r="2.5" fill="#c4c97a" opacity="0.9"/>

    <!-- Central node — glowing -->
    <circle cx="400" cy="320" r="18" fill="#8fa36c" opacity="0.06" filter="url(#blur-md)"/>
    <circle cx="400" cy="320" r="8" fill="#8fa36c" opacity="0.15" filter="url(#blur-sm)"/>
    <circle cx="400" cy="320" r="4" fill="#c4c97a" opacity="0.8"/>
    <circle cx="400" cy="320" r="2" fill="#ffffff" opacity="0.6"/>
  </g>

  <!-- Secondary cluster — right -->
  <g opacity="0.5">
    <line x1="900" y1="380" x2="1020" y2="320" stroke="#8fa36c" stroke-width="0.7" opacity="0.35"/>
    <line x1="900" y1="380" x2="820" y2="460" stroke="#8fa36c" stroke-width="0.7" opacity="0.35"/>
    <line x1="900" y1="380" x2="980" y2="460" stroke="#8fa36c" stroke-width="0.7" opacity="0.35"/>
    <line x1="1020" y1="320" x2="1140" y2="280" stroke="#8fa36c" stroke-width="0.5" opacity="0.25"/>

    <circle cx="1020" cy="320" r="3" fill="#8fa36c" opacity="0.5"/>
    <circle cx="820" cy="460" r="3" fill="#8fa36c" opacity="0.5"/>
    <circle cx="980" cy="460" r="3" fill="#8fa36c" opacity="0.5"/>
    <circle cx="1140" cy="280" r="2" fill="#8fa36c" opacity="0.35"/>

    <circle cx="900" cy="380" r="12" fill="#8fa36c" opacity="0.05" filter="url(#blur-md)"/>
    <circle cx="900" cy="380" r="3.5" fill="#8fa36c" opacity="0.6"/>
    <circle cx="900" cy="380" r="1.5" fill="#c4c97a" opacity="0.7"/>
  </g>

  <!-- Geometric ring — центр -->
  <circle cx="400" cy="320" r="60" stroke="#8fa36c" stroke-width="0.6" fill="none" opacity="0.12"/>
  <circle cx="400" cy="320" r="90" stroke="#8fa36c" stroke-width="0.4" fill="none" opacity="0.08"/>

  <!-- Data stream lines — горизонтальные потоки данных -->
  <g stroke="#8fa36c" stroke-width="0.8" opacity="0.2">
    <line x1="0" y1="320" x2="260" y2="320" stroke-dasharray="4 8"/>
    <line x1="560" y1="320" x2="760" y2="320" stroke-dasharray="4 8"/>
  </g>

  <!-- Corner accent — верхний правый -->
  <g opacity="0.25" stroke="#8fa36c" stroke-width="0.6" fill="none">
    <line x1="1100" y1="60" x2="1180" y2="60"/>
    <line x1="1180" y1="60" x2="1180" y2="140"/>
    <circle cx="1140" cy="100" r="20"/>
    <circle cx="1140" cy="100" r="8"/>
    <circle cx="1140" cy="100" r="2" fill="#8fa36c"/>
  </g>

  <!-- Corner accent — нижний левый -->
  <g opacity="0.2" stroke="#8fa36c" stroke-width="0.6" fill="none">
    <line x1="20" y1="690" x2="100" y2="690"/>
    <line x1="20" y1="690" x2="20" y2="610"/>
    <circle cx="60" cy="650" r="16"/>
    <circle cx="60" cy="650" r="6"/>
  </g>

  <!-- Subtle scan line -->
  <line x1="0" y1="480" x2="1200" y2="480" stroke="#8fa36c" stroke-width="0.3" opacity="0.08" stroke-dasharray="2 20"/>

  <!-- Top-left label — брендинг -->
  <text x="60" y="80" font-family="monospace" font-size="11" fill="#8fa36c" opacity="0.35" letter-spacing="2">AI ASSISTANT</text>
  <text x="60" y="98" font-family="monospace" font-size="10" fill="#8fa36c" opacity="0.2" letter-spacing="1">OFFICE MODULE v2.1</text>
</svg>
